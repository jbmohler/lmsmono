<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="card w-full max-w-sm p-6">
    <h1 class="text-xl font-semibold text-gray-900 mb-6 text-center">Set New Password</h1>

    @if (!token) {
      <div class="p-3 bg-red-50 border border-red-200 rounded-md text-sm text-red-700 mb-4">
        Invalid reset link. Please request a new one.
      </div>
      <a routerLink="/forgot-password" class="btn btn-secondary w-full text-center block">
        Request Reset Link
      </a>
    } @else if (success()) {
      <div class="p-3 bg-green-50 border border-green-200 rounded-md text-sm text-green-700 mb-4">
        Password updated. Redirecting to sign in...
      </div>
    } @else {
      @if (error()) {
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-md text-sm text-red-700">
          {{ error() }}
        </div>
      }

      <div class="flex flex-col gap-4">
        <div>
          <label for="newPassword" class="form-label">New Password</label>
          <input
            #passwordInput
            type="password"
            id="newPassword"
            [(ngModel)]="newPassword"
            [disabled]="loading()"
            autocomplete="new-password"
            class="w-full"
          />
        </div>

        <div>
          <label for="confirmPassword" class="form-label">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            [(ngModel)]="confirmPassword"
            [disabled]="loading()"
            autocomplete="new-password"
            class="w-full"
          />
        </div>

        <button
          type="button"
          (click)="onSubmit()"
          [disabled]="loading() || !newPassword || !confirmPassword"
          class="btn btn-primary w-full"
        >
          @if (loading()) {
            Saving...
          } @else {
            Set Password
          }
        </button>
      </div>
    }
  </div>
</div>
