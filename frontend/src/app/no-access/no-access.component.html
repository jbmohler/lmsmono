<div class="flex flex-col items-center justify-center h-screen gap-4 text-center">
  <h1 class="text-2xl font-semibold text-gray-800">No access</h1>
  <p class="text-gray-500">
    Your account ({{ user()?.username }}) has no roles assigned.<br>
    Contact an administrator to have a role assigned.
  </p>
  <button type="button" class="btn btn-secondary" (click)="logout()">Sign out</button>
</div>
