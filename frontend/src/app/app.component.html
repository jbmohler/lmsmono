@if (isLoggedIn()) {
<div class="h-screen w-full grid grid-rows-[auto_1fr_auto] bg-gray-100 overflow-x-hidden">
  <!-- Header -->
  <header class="bg-slate-800 min-w-0">
    <div class="max-w-7xl mx-auto px-4 min-w-0">
      <!-- Top bar with logo and user menu -->
      <div class="flex items-center justify-between h-12">
        <a routerLink="/" class="flex items-center gap-2 text-lg font-semibold text-white tracking-tight">
          <img src="/assets/logo.svg" alt="LMS logo" class="h-7 w-7">
          LMS
        </a>
        <div class="flex items-center gap-4">
          <span class="text-sm text-slate-300">{{ user()?.username }}</span>
          <button
            type="button"
            (click)="logout()"
            class="text-sm text-slate-400 hover:text-white"
          >
            Sign out
          </button>
        </div>
      </div>
    </div>
    <!-- Tab bar -->
    <div class="bg-slate-700 px-4 overflow-x-auto min-w-0">
      <nav class="flex items-end gap-1 -mb-px min-w-0">
        @for (tab of visibleTabs(); track tab.path) {
          <a
            [routerLink]="tab.path"
            routerLinkActive="tab-active"
            class="tab-link"
          >
            {{ tab.label }}
          </a>
        }
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="overflow-auto">
    <router-outlet />
  </main>

  <!-- Keyboard shortcut hints (shown at bottom, hidden on mobile) -->
  <footer class="hidden md:block bg-slate-800 px-4 py-2">
    <div class="max-w-7xl mx-auto flex items-center gap-6 text-xs text-slate-400">
      <span><kbd class="px-1.5 py-0.5 bg-slate-700 rounded text-slate-300">Ctrl+Shift+R</kbd> Transactions</span>
      <span><kbd class="px-1.5 py-0.5 bg-slate-700 rounded text-slate-300">Ctrl+Shift+K</kbd> Contacts</span>
      <span><kbd class="px-1.5 py-0.5 bg-slate-700 rounded text-slate-300">Ctrl+Shift+D</kbd> Data Bits</span>
    </div>
  </footer>
</div>
} @else {
  <router-outlet />
}
