@if (mode() === 'tree') {
  <div class="flex flex-col gap-0.5" role="group">
    @for (node of treeNodes(); track node.id) {
      <label
        class="flex items-center gap-1 py-0.5 rounded cursor-pointer select-none min-w-0"
        [style.padding-left.rem]="node.depth * 1.25"
        [class.opacity-50]="disabled()"
        [class.cursor-not-allowed]="disabled()"
      >
        <input
          type="checkbox"
          [checked]="isSelected(node.id)"
          [disabled]="disabled()"
          (change)="toggle(node)"
          class="rounded border-gray-300 text-blue-600 focus:ring-blue-500 shrink-0"
        />
        <span class="text-sm truncate" [class.font-medium]="isSelected(node.id)">{{ node.name }}</span>
      </label>
    }
    @if (treeNodes().length === 0) {
      <p class="text-sm text-gray-400 italic">No tags available</p>
    }
  </div>
} @else {
  <div class="flex flex-col gap-1" role="group">
    @for (tag of flatNodes(); track tag.id) {
      <label
        class="flex items-center gap-1 cursor-pointer select-none min-w-0"
        [class.opacity-50]="disabled()"
        [class.cursor-not-allowed]="disabled()"
      >
        <input
          type="checkbox"
          [checked]="isSelected(tag.id)"
          [disabled]="disabled()"
          (change)="toggle(tag)"
          class="rounded border-gray-300 text-blue-600 focus:ring-blue-500 shrink-0"
        />
        <span class="text-sm text-gray-800 whitespace-nowrap">{{ tag.name }}</span>
        @if (tag.description) {
          <span class="text-xs text-gray-400">{{ tag.description }}</span>
        }
      </label>
    }
    @if (flatNodes().length === 0) {
      <p class="text-sm text-gray-400 italic">No tags available</p>
    }
  </div>
}
